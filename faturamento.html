<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Faturamento — Saída</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0f1e;--c1:#0f1a2e;--bd:#1e3558;--b2:#2a4870;--tx:#dff0ff;--t2:#7aafcc;--t3:#3a6880;--ac:#00e896;--r:14px;--rs:10px}
body{background:var(--bg);color:var(--tx);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.box{width:100%;max-width:440px}
.hdr{text-align:center;margin-bottom:28px}
.hdr .ic{font-size:52px;display:block;margin-bottom:8px}
.hdr h1{font-size:20px;font-weight:800;color:var(--ac);letter-spacing:1px;text-transform:uppercase}
.hdr p{font-size:12px;color:var(--t2);margin-top:5px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.fg label{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px}
.fg input{background:var(--c1);border:2px solid var(--bd);border-radius:var(--rs);color:var(--tx);padding:14px 16px;font-size:16px;font-family:system-ui,sans-serif;outline:none;transition:border-color .2s;width:100%}
.fg input:focus{border-color:var(--ac)}
.placa-inp{text-transform:uppercase;letter-spacing:3px;font-weight:700;font-family:monospace;font-size:20px;text-align:center}
.nf-inp{text-transform:uppercase;letter-spacing:1px;font-size:15px}
.go{width:100%;padding:16px;border:none;border-radius:var(--rs);font-size:16px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:1px;background:linear-gradient(135deg,#00e896,#009960);color:#000;transition:all .2s;margin-top:4px}
.go:active{transform:scale(.97)}
.go:disabled{opacity:.3;cursor:not-allowed}
.msg{padding:12px 16px;border-radius:var(--rs);font-size:13px;margin-bottom:14px;display:none;text-align:center;font-weight:600;line-height:1.5}
.msg.on{display:block}
.ok{background:rgba(0,232,150,.1);border:1px solid rgba(0,232,150,.3);color:#00e896}
.er{background:rgba(255,68,102,.1);border:1px solid rgba(255,68,102,.3);color:#ff4466}
.filtro-rel{background:var(--c1);border:1px solid var(--bd);border-radius:var(--rs);padding:14px;margin-top:16px;display:flex;flex-direction:column;gap:10px}
.filtro-titulo{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px}
.filtro-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.filtro-label{font-size:11px;color:var(--t3);white-space:nowrap;min-width:80px}
.filtro-input{flex:1;padding:7px 10px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:12px;font-family:monospace;outline:none;min-width:0}
.filtro-input:focus{border-color:var(--ac)}
.filtro-sep{font-size:12px;color:var(--t3)}
.turno-btn{padding:6px 10px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--bg);color:var(--t2);font-size:10.5px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s}
.turno-btn.on{border-color:#00e896;color:#00e896;background:rgba(0,232,150,.1)}
.turno-btn:hover{border-color:#00e896}
.filtro-input:disabled{opacity:.35;cursor:not-allowed}
.btn-row{display:flex;gap:8px;margin-top:8px}
.exp-btn{flex:1;padding:12px;border:1px solid rgba(0,232,150,.4);border-radius:var(--rs);background:rgba(0,232,150,.07);color:#00e896;font-size:13px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s}
.exp-btn:hover{background:rgba(0,232,150,.15)}
.modal-prev{position:fixed;inset:0;z-index:999;display:none;align-items:flex-start;justify-content:center;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);padding:16px;overflow-y:auto}
.modal-prev.show{display:flex}
.modal-box{background:#0f1a2e;border:1px solid #1e3558;border-radius:14px;width:100%;max-width:900px;margin:auto;overflow:hidden}
.modal-head{padding:14px 18px;border-bottom:1px solid #1e3558;display:flex;align-items:center;gap:10px}
.modal-title{font-family:system-ui,sans-serif;font-size:16px;font-weight:800;color:#dff0ff;flex:1;letter-spacing:1px}
.modal-close-btn{width:30px;height:30px;border:1px solid #1e3558;border-radius:6px;background:transparent;color:#7aafcc;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.modal-close-btn:hover{border-color:#ff4466;color:#ff4466}
.modal-body{padding:16px 18px;overflow-x:auto}
.prev-info{font-size:11px;color:#7aafcc;margin-bottom:10px}
.prev-table{width:100%;border-collapse:collapse;font-size:11px}
.prev-table th{text-align:center;padding:8px 10px;font-size:9px;font-weight:700;color:#fff;background:#003366;text-transform:uppercase;letter-spacing:.5px;border:1px solid #1e3558;white-space:nowrap}
.prev-table td{padding:7px 10px;border:1px solid #1e3558;vertical-align:middle;color:#dff0ff;text-align:center}
.prev-table tr:nth-child(even) td{background:rgba(0,232,150,.04)}
.prev-placa{font-family:monospace;font-size:13px;font-weight:700;color:#00e896;letter-spacing:1px}
.modal-foot{padding:12px 18px;border-top:1px solid #1e3558;display:flex;gap:8px;justify-content:flex-end}
.pdf-btn{padding:10px 22px;border:none;border-radius:10px;background:#00e896;color:#000;font-size:12px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.5px;transition:opacity .2s}
.pdf-btn:hover{opacity:.88}
</style>
</head>
<body>
<div class="box">
  <div class="hdr">
    <span class="ic">🧾</span>
    <h1>Faturamento — Saída</h1>
    <p>Digite a AC e a placa do caminhão</p>
  </div>
  <div id="msg" class="msg"></div>
  <div class="fg">
    <label>Número da AC</label>
    <input id="ac" type="text" placeholder="Ex: AC-001" autocomplete="off" oninput="chk()" style="text-transform:uppercase"/>
  </div>
  <div class="fg">
    <label>Placa do Caminhão</label>
    <input id="pl" type="text" placeholder="ABC1234" maxlength="8" autocomplete="off" oninput="chk()" class="placa-inp"/>
  </div>
  <div class="fg">
    <label>Nota Fiscal</label>
    <input id="nf" type="text" placeholder="Ex: 549366" autocomplete="off" class="nf-inp"/>
  </div>
  <button class="go" id="go" onclick="confirmar()" disabled>🚀 Confirmar Saída</button>

  <div class="filtro-rel">
    <div class="filtro-titulo">📅 Filtro para o relatório</div>
    <div class="filtro-row">
      <span class="filtro-label">De:</span>
      <input class="filtro-input" type="date" id="f-data-ini" style="max-width:150px"/>
      <span class="filtro-sep">até</span>
      <input class="filtro-input" type="date" id="f-data-fim" style="max-width:150px"/>
    </div>
    <div class="filtro-row">
      <span class="filtro-label">Horário:</span>
      <input class="filtro-input" type="time" id="f-hora-ini" style="max-width:100px" placeholder="00:00"/>
      <span class="filtro-sep">até</span>
      <input class="filtro-input" type="time" id="f-hora-fim" style="max-width:100px" placeholder="23:59"/>
    </div>
    <div class="filtro-row">
      <span class="filtro-label">Turno:</span>
      <button class="turno-btn on" id="tb-geral" onclick="setTurno('geral',this)">Geral</button>
      <button class="turno-btn" id="tb-a" onclick="setTurno('A',this)">A · 23h–07h</button>
      <button class="turno-btn" id="tb-b" onclick="setTurno('B',this)">B · 07h–15h</button>
      <button class="turno-btn" id="tb-c" onclick="setTurno('C',this)">C · 15h–23h</button>
    </div>
  </div>
  <div class="btn-row">
    <button class="exp-btn" onclick="verRelatorio()">👁️ Visualizar</button>
    <button class="exp-btn" onclick="gerarPDF()">📄 PDF</button>
    <button class="exp-btn" onclick="exportExcel()">📊 Excel</button>
  </div>
</div>

<!-- MODAL PREVIEW -->
<div class="modal-prev" id="modal-prev">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title">🧾 CONTROLE DE FATURAMENTO</div>
      <button class="modal-close-btn" onclick="document.getElementById('modal-prev').classList.remove('show')">✕</button>
    </div>
    <div class="modal-body">
      <div class="prev-info" id="prev-info"></div>
      <div id="prev-body"></div>
    </div>
    <div class="modal-foot">
      <button class="modal-close-btn" style="padding:8px 16px;width:auto" onclick="document.getElementById('modal-prev').classList.remove('show')">Fechar</button>
      <button class="pdf-btn" onclick="gerarPDF()">📄 Exportar PDF</button>
    </div>
  </div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import{getFirestore,collection,onSnapshot,updateDoc,doc,Timestamp}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCMacFP0kGkgOTCqdWzf6Y65LN2q4tw28Y",authDomain:"cimento-6163b.firebaseapp.com",projectId:"cimento-6163b",storageBucket:"cimento-6163b.firebasestorage.app",messagingSenderId:"773785464621",appId:"1:773785464621:web:02dc9de04a7e2af231ada4"});
const db=getFirestore(app);
const hoje=()=>new Date().toLocaleDateString("pt-BR",{timeZone:"America/Fortaleza"}).split("/").reverse().join("-");
const fmtT=d=>d?d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"}):"—";
let HD=[],HD_REL=[];
onSnapshot(collection(db,"caminhoes_rastreio"),snap=>{
  const hj=hoje();
  const todos=snap.docs.map(d=>{return{id:d.id,...d.data()}});
  HD=todos.filter(c=>c.data===hj||(c.data<hj&&c.setorAtual!=="concluido"));
  HD_REL=todos; // relatório: olha TODOS os documentos, sem excluir concluído/dia anterior
});
window.chk=()=>{
  const a=document.getElementById("ac").value.trim();
  const p=document.getElementById("pl").value.replace(/[^A-Z0-9]/gi,"");
  document.getElementById("go").disabled=!(a.length>=2&&p.length>=7);
};
window.confirmar=async()=>{
  const ac=document.getElementById("ac").value.trim().toUpperCase();
  const pl=document.getElementById("pl").value.toUpperCase().replace(/[^A-Z0-9]/g,"");
  if(!ac||pl.length<7){showMsg("er","Preencha a AC e a placa.");return;}
  const c=HD.find(d=>d.placa===pl&&d.ac===ac&&d.setorAtual!=="concluido");
  if(!c){showMsg("er","AC/Placa não encontrada em processo hoje. Verifique os dados.");return;}
  document.getElementById("go").disabled=true;
  try{
    const ts=new Date();
    const nfVal=document.getElementById("nf").value.trim();
await updateDoc(doc(db,"caminhoes_rastreio",c.id),{"faturamento.ts":Timestamp.fromDate(ts),setorAtual:"concluido",...(nfVal?{notaFiscal:nfVal}:{})});
    showMsg("ok","🚀 "+pl+" liberado! AC: "+ac+" · Saída: "+fmtT(ts));
    document.getElementById("ac").value="";document.getElementById("pl").value="";document.getElementById("nf").value="";
  }catch(e){showMsg("er","Erro: "+e.message);}
  document.getElementById("go").disabled=false;
};
function showMsg(t,x){const e=document.getElementById("msg");e.className="msg on "+t;e.textContent=x;if(t==="ok")setTimeout(()=>e.className="msg",5000);}

// ── Filtro do relatório ──────────────────────────────────────────────
let MT="geral"; // 'geral' | 'A' | 'B' | 'C'
(()=>{
  const hj=hoje();
  const fdi=document.getElementById("f-data-ini");
  if(fdi)fdi.value=hj;
  const fdf=document.getElementById("f-data-fim");
  if(fdf)fdf.value=hj;
  const fhi=document.getElementById("f-hora-ini");
  if(fhi)fhi.value="00:00";
  const fhf=document.getElementById("f-hora-fim");
  if(fhf)fhf.value="23:59";
})();
const fmtDT=ts=>{
  if(!ts)return"—";
  const d=ts.toDate?ts.toDate():new Date(ts);
  return d.toLocaleDateString("pt-BR",{timeZone:"America/Fortaleza",day:"2-digit",month:"2-digit",year:"numeric"})+" "+d.toLocaleTimeString("pt-BR",{timeZone:"America/Fortaleza",hour:"2-digit",minute:"2-digit"});
};
const fmtEx=d=>d?d.toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit",second:"2-digit"}):"";
function getTurno(d){
  if(!d)return null;
  const h=d.getHours();
  if(h>=23||h<7)return"A";
  if(h>=7&&h<15)return"B";
  return"C";
}
window.setTurno=(t,el)=>{
  MT=t;
  document.querySelectorAll(".turno-btn").forEach(b=>b.classList.remove("on"));
  el.classList.add("on");
  // Turno A/B/C já define a faixa de hora — desativa o filtro de Horário manual
  const disable=t!=="geral";
  const fhi=document.getElementById("f-hora-ini");
  const fhf=document.getElementById("f-hora-fim");
  if(fhi)fhi.disabled=disable;
  if(fhf)fhf.disabled=disable;
};
function getFiltros(){
  const dataIniVal=document.getElementById("f-data-ini")?.value||hoje();
  const dataFimVal=document.getElementById("f-data-fim")?.value||dataIniVal;
  const hIni=document.getElementById("f-hora-ini")?.value||"00:00";
  const hFim=document.getElementById("f-hora-fim")?.value||"23:59";
  return{dataIniVal,dataFimVal,hIni,hFim};
}
function buildRegistrosRel(){
  const{dataIniVal,dataFimVal,hIni,hFim}=getFiltros();
  const [hiH,hiM]=hIni.split(":").map(Number);
  const [hfH,hfM]=hFim.split(":").map(Number);
  const iniMin=hiH*60+hiM,fimMin=hfH*60+hfM;
  // Só entram registros com faturamento.ts preenchido (já liberados)
  let r=HD_REL.filter(c=>{
    if(!c.data||c.data<dataIniVal||c.data>dataFimVal)return false;
    const ft=c.faturamento?.ts?.toDate?.();
    if(!ft)return false;
    if(MT==="geral"){
      const min=ft.getHours()*60+ft.getMinutes();
      return min>=iniMin&&min<=fimMin;
    }
    return getTurno(ft)===MT;
  });
  r.sort((a,b)=>{
    const ta=a.faturamento?.ts?.toDate?.()?.getTime()||0;
    const tb=b.faturamento?.ts?.toDate?.()?.getTime()||0;
    return ta-tb;
  });
  return r;
}
const TIPO_CARGA_LABELS={ensacado:"Ensacado",granel:"Granel",bigbag:"Big Bag"};
function buildLinhasRel(registros,forPrint=false){
  const tdStyle=forPrint?"border:1px solid #ccc;padding:6px 10px":"border:1px solid #1e3558;padding:7px 10px;text-align:center";
  return registros.map((c,i)=>{
    const ft=c.faturamento?.ts?.toDate?.();
    const carga=TIPO_CARGA_LABELS[c.tipoCarga]||c.tipoCarga||"-";
    const cimento=c.tipoCimento||c.tipoCimentoLabel||"-";
    const turno=ft?(getTurno(ft)||"-"):"-";
    return`<tr>
      <td style="${tdStyle};text-align:center">${i+1}</td>
      <td style="${tdStyle};font-weight:bold;font-family:monospace;letter-spacing:1px${forPrint?"":" ;color:#00e896"}">${c.placa||"-"}</td>
      <td style="${tdStyle}">${c.ac||"-"}</td>
      <td style="${tdStyle}">${carga}</td>
      <td style="${tdStyle}">${cimento}</td>
      <td style="${tdStyle}">${turno}</td>
      <td style="${tdStyle}">${c.notaFiscal||"-"}</td>
      <td style="${tdStyle}">${ft?fmtDT(c.faturamento.ts):"-"}</td>
    </tr>`;
  }).join("");
}
const TURNO_LABELS={geral:"Geral",A:"Turno A (23h–07h)",B:"Turno B (07h–15h)",C:"Turno C (15h–23h)"};
function fmtDia(v){const [a,m,d]=v.split("-");return`${d}/${m}/${a}`;}
window.verRelatorio=()=>{
  const registros=buildRegistrosRel();
  const{dataIniVal,dataFimVal}=getFiltros();
  const periodoTxt=dataIniVal===dataFimVal?fmtDia(dataIniVal):`${fmtDia(dataIniVal)} a ${fmtDia(dataFimVal)}`;
  const hIni=document.getElementById("f-hora-ini")?.value||"00:00";
  const hFim=document.getElementById("f-hora-fim")?.value||"23:59";
  const horarioTxt=MT==="geral"?` · ${hIni}h às ${hFim}h`:"";
  document.getElementById("prev-info").textContent=`Período: ${periodoTxt}${horarioTxt} · Turno: ${TURNO_LABELS[MT]} · ${registros.length} veículo${registros.length!==1?"s":""}`;
  document.getElementById("prev-body").innerHTML=`
    <table class="prev-table">
      <thead><tr>
        <th style="width:40px">Nº</th><th>Placa</th><th>AC</th><th>Carga</th><th>Cimento</th><th>Turno</th><th>Nota Fiscal</th><th>Hora Saída</th>
      </tr></thead>
      <tbody>${buildLinhasRel(registros)||'<tr><td colspan="8" style="text-align:center;padding:16px;color:#3a6880">Nenhum registro</td></tr>'}</tbody>
    </table>`;
  document.getElementById("modal-prev").classList.add("show");
};
window.gerarPDF=()=>{
  const registros=buildRegistrosRel();
  const{dataIniVal,dataFimVal}=getFiltros();
  const periodoTxt=dataIniVal===dataFimVal?fmtDia(dataIniVal):`${fmtDia(dataIniVal)} a ${fmtDia(dataFimVal)}`;
  const hIni=document.getElementById("f-hora-ini")?.value||"00:00";
  const hFim=document.getElementById("f-hora-fim")?.value||"23:59";
  const horarioTxt=MT==="geral"?` &nbsp;·&nbsp; Horário: ${hIni}h às ${hFim}h`:"";
  const linhas=buildLinhasRel(registros,true);
  const janela=window.open("","_blank","width=900,height=700");
  janela.document.write(`<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="UTF-8"/>
<title>Controle de Faturamento — ${periodoTxt}</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;font-size:11pt;padding:24px;color:#000}
  h2{font-size:14pt;font-weight:bold;text-align:center;margin-bottom:14pt;text-transform:uppercase;letter-spacing:1px}
  .hinfo{margin-bottom:16pt;border-bottom:2px solid #000;padding-bottom:10pt;font-size:11pt}
  table.reg{border-collapse:collapse;width:100%}
  table.reg th{background:#003366;color:#fff;padding:7px 10px;font-size:10pt;text-align:center;border:1px solid #ccc}
  table.reg td{padding:7px 10px;font-size:10pt;border:1px solid #ccc;text-align:center}
  table.reg tr:nth-child(even) td{background:#f0f4fb}
  .footer{margin-top:20pt;font-size:8pt;color:#888;text-align:center;border-top:1pt solid #ccc;padding-top:6pt}
  @media print{@page{margin:1.5cm;size:A4 landscape}}
</style>
</head><body>
<h2>Controle de Faturamento</h2>
<div class="hinfo">Período: ${periodoTxt}${horarioTxt} &nbsp;·&nbsp; Turno: ${TURNO_LABELS[MT]}</div>
<table class="reg">
  <thead><tr>
    <th style="width:40px">Nº</th><th>Placa</th><th>AC</th><th>Carga</th><th>Cimento</th><th>Turno</th><th>Nota Fiscal</th><th>Hora Saída</th>
  </tr></thead>
  <tbody>${linhas||'<tr><td colspan="8" style="text-align:center;padding:16px">Nenhum registro</td></tr>'}</tbody>
</table>
<div class="footer">Gerado automaticamente — Sistema de Rastreio de Carregamento · Apodi Cimentos · ${periodoTxt}</div>
</body></html>`);
  janela.document.close();janela.focus();
  setTimeout(()=>janela.print(),600);
};

window.exportExcel=()=>{
  const registros=buildRegistrosRel();
  if(!registros.length){alert("Nenhum dado para exportar no filtro selecionado.");return;}
  const rows=registros.map(c=>{
    const ft=c.faturamento?.ts?.toDate?.();
    return{
      "Placa":c.placa||"",
      "AC":c.ac||"",
      "Carga":TIPO_CARGA_LABELS[c.tipoCarga]||c.tipoCarga||"",
      "Cimento":c.tipoCimento||c.tipoCimentoLabel||"",
      "Turno":ft?(getTurno(ft)||""):"",
      "Nota Fiscal":c.notaFiscal||"",
      "Hora Saída":fmtEx(ft),
    };
  });
  const ws=XLSX.utils.json_to_sheet(rows);
  ws["!cols"]=[{wch:10},{wch:10},{wch:12},{wch:12},{wch:8},{wch:14},{wch:20}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Faturamento");
  const{dataIniVal,dataFimVal}=getFiltros();
  const turnoSuffix=MT!=="geral"?`_turno${MT}`:"";
  const fname=dataIniVal===dataFimVal?`faturamento_${dataIniVal}${turnoSuffix}.xlsx`:`faturamento_${dataIniVal}_a_${dataFimVal}${turnoSuffix}.xlsx`;
  XLSX.writeFile(wb,fname);
};
</script>
<!-- Badge Admin -->
<script>
(function(){
  const ts=parseInt(localStorage.getItem("admin_auth_ts")||"0");
  if(localStorage.getItem("admin_auth")==="1"&&Date.now()-ts<8*60*60*1000){
    const b=document.createElement("div");
