<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>📦 TRIAGEM DE PALETE</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700;800&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060d18;--bg2:#0b1524;--bg3:#102030;--bg4:#152840;--bd:#162840;--b2:#1e3a58;--tx:#e2eeff;--t2:#7a9fd4;--t3:#3a5880;--bl:#00d4ff;--gr:#00e896;--ye:#ffd000;--rd:#ff4466;--pu:#a78bfa;--or:#fb923c;--r:12px;--rs:8px}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh}
.top{background:var(--bg2);border-bottom:2px solid var(--bd);height:52px;display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:200}
.logo{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:800;letter-spacing:1px;flex:1}
.live{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--gr)}
.ldot{width:7px;height:7px;background:var(--gr);border-radius:50%;animation:pu 1.5s ease-in-out infinite}
@keyframes pu{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.5)}}
.nav{background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;overflow-x:auto;padding:0 6px;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav a{display:flex;flex-direction:column;align-items:center;padding:9px 11px;color:var(--t2);font-size:10px;font-weight:600;border-bottom:3px solid transparent;text-decoration:none;white-space:nowrap;gap:2px;min-width:58px;transition:all .15s}
.nav a:hover{color:var(--tx)}
.nav a.cur{color:var(--tx);border-bottom-color:var(--ye)}
.nav a .ni{font-size:16px}
.wrap{max-width:680px;margin:0 auto;padding:18px 13px}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:14px}
.ct{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;margin-bottom:14px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:11px}
.fg label{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.fg input{background:var(--bg3);border:1px solid var(--b2);border-radius:var(--rs);color:var(--tx);padding:10px 12px;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;width:100%}
.fg input:focus{border-color:var(--ye)}
.pa{background:var(--bg3);border:2px dashed var(--b2);border-radius:var(--rs);min-height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;transition:border-color .2s;position:relative;overflow:hidden}
.pa:hover{border-color:var(--ye)}
.pa.ok{border-color:var(--gr);border-style:solid}
.pa input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.pai{font-size:30px;pointer-events:none}.pat{font-size:12px;color:var(--t2);pointer-events:none}.pah{font-size:10px;color:var(--t3);pointer-events:none}
.pap{width:100%;max-height:170px;object-fit:cover;display:none}
.pats{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.75);padding:5px 9px;font-size:11px;font-weight:600;color:var(--gr);display:none}
.pa.ok .pai,.pa.ok .pat,.pa.ok .pah{display:none}
.pa.ok .pap,.pa.ok .pats{display:block}
.btn{width:100%;padding:12px;border:none;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:1px;transition:all .2s;text-transform:uppercase;margin-top:4px}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn:not(:disabled):hover{transform:translateY(-1px);opacity:.88}
.b-bl{background:linear-gradient(135deg,var(--bl),#0099bb);color:#000}
.b-gr{background:linear-gradient(135deg,var(--gr),#00a060);color:#000}
.b-ye{background:linear-gradient(135deg,var(--ye),#cc9900);color:#000}
.b-rd{background:linear-gradient(135deg,var(--rd),#cc2244);color:#fff}
.b-pu{background:linear-gradient(135deg,var(--pu),#6d28d9);color:#fff}
.b2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.al{padding:10px 13px;border-radius:var(--rs);font-size:13px;margin-bottom:12px;display:none}
.al.on{display:block}
.a-ok{background:rgba(0,232,150,.1);border:1px solid rgba(0,232,150,.3);color:var(--gr)}
.a-er{background:rgba(255,68,102,.1);border:1px solid rgba(255,68,102,.3);color:var(--rd)}
.ifo{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.2);border-radius:var(--rs);padding:12px;margin-bottom:12px;display:none}
.ifo .ip{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:800;color:var(--bl);letter-spacing:2px}
.ifo .ia{font-size:11px;color:var(--t2);margin-top:2px}.ifo .is{font-size:11px;color:var(--tx);margin-top:3px}
.rl{display:flex;flex-direction:column;gap:7px}
.ri{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rs);padding:10px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.rip{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;color:var(--bl);letter-spacing:1px}
.rii{font-size:11px;color:var(--t2);margin-top:2px;line-height:1.7}
.pi{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;text-transform:uppercase;white-space:nowrap}
.pb{background:rgba(0,212,255,.12);color:var(--bl);border:1px solid rgba(0,212,255,.2)}
.py{background:rgba(255,208,0,.12);color:var(--ye);border:1px solid rgba(255,208,0,.2)}
.pr{background:rgba(255,68,102,.12);color:var(--rd);border:1px solid rgba(255,68,102,.2)}
.pp{background:rgba(167,139,250,.12);color:var(--pu);border:1px solid rgba(167,139,250,.2)}
.pg{background:rgba(0,232,150,.12);color:var(--gr);border:1px solid rgba(0,232,150,.2)}
.em{text-align:center;padding:24px;color:var(--t3);font-size:13px}
@media(max-width:600px){.b2{grid-template-columns:1fr}}</style>
</head>
<body>
<div class="top">
  <div class="logo" style="color:#ffd000">📦 TRIAGEM DE PALETE</div>
  <div class="live"><div class="ldot"></div>AO VIVO</div>
</div>
<nav class="nav">
  <a href="master.html"><span class="ni">👁️</span>Master</a>
  <a href="posto1.html"><span class="ni">🏁</span>Posto 1</a>
  <a href="triagem.html" class="cur"><span class="ni">📦</span>Triagem</a>
  <a href="carregamento.html"><span class="ni">🏗️</span>Carga</a>
  <a href="enlonamento.html"><span class="ni">🪢</span>Enlone</a>
  <a href="faturamento.html"><span class="ni">🧾</span>Saída</a>
</nav>
<div class="wrap">
<div id="mg"></div>
<div class="card">
  <div class="ct">📦 TRIAGEM DE PALETE</div>
  <div class="fg"><label>Placa do Caminhão</label>
    <input id="pl" type="text" placeholder="ABC1234" maxlength="8" style="text-transform:uppercase;letter-spacing:2px;font-weight:700;font-family:monospace" oninput="bsc()"/>
  </div>
  <div class="ifo" id="ifo"><div class="ip" id="ip"></div><div class="ia" id="ia"></div><div class="is" id="is"></div></div>
  <div class="fg">
  <label>📷 Foto de INÍCIO da triagem — data/hora automática no momento da foto</label>
  <div class="pa" id="pa-tri-i" onclick="document.getElementById('fi-tri-i').click()">
    <input type="file" id="fi-tri-i" accept="image/*" capture="environment" onchange="capF('tri-i',event)"/>
    <div class="pai">📷</div><p class="pat">Foto de INÍCIO da triagem</p><small class="pah">Timestamp automático</small>
    <img class="pap" id="pv-tri-i"/><div class="pats" id="pts-tri-i"></div>
  </div>
</div>
  <div class="fg">
  <label>📷 Foto de FIM da triagem — data/hora automática no momento da foto</label>
  <div class="pa" id="pa-tri-f" onclick="document.getElementById('fi-tri-f').click()">
    <input type="file" id="fi-tri-f" accept="image/*" capture="environment" onchange="capF('tri-f',event)"/>
    <div class="pai">📷</div><p class="pat">Foto de FIM da triagem</p><small class="pah">Timestamp automático</small>
    <img class="pap" id="pv-tri-f"/><div class="pats" id="pts-tri-f"></div>
  </div>
</div>
  <div class="b2">
    <button class="btn b-ye" id="bn-i" onclick="doS('i')" disabled>▶ INICIAR</button>
    <button class="btn b-gr" id="bn-f" onclick="doS('f')" disabled>⏹ FINALIZAR</button>
  </div>
</div>
<div class="card"><div class="ct">📋 Registros Hoje</div><div id="lst"><div class="em">Aguardando...</div></div></div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import{getFirestore,collection,addDoc,onSnapshot,query,orderBy,updateDoc,doc,Timestamp}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
import{getStorage,ref,uploadString,getDownloadURL}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-storage.js";
const app=initializeApp({  apiKey:"AIzaSyCzd3mlF0qlPvw1AwVv3PAt9RXnZQ06sdY",
  authDomain:"cimento-d887e.firebaseapp.com",
  projectId:"cimento-d887e",
  storageBucket:"cimento-d887e.firebasestorage.app",
  messagingSenderId:"1098178518193",
  appId:"1:1098178518193:web:8712992a0eda7730ce9690"});
const db=getFirestore(app),st=getStorage(app);

const hoje=()=>new Date().toISOString().split("T")[0];
const fmt=d=>d?d.toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"}):"—";
const fmtT=d=>d?d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"}):"—";
function dur(ms){if(!ms||ms<0)return"";const m=Math.round(ms/60000);return m<60?m+"min":Math.floor(m/60)+"h"+m%60+"m";}
const SL={posto1:"Entrada",triagem_inicio:"Em Triagem",triagem_fim:"Triagem OK",carregamento_inicio:"Carregando",carregamento_fim:"Carregado",enlonamento_inicio:"Enlonando",enlonamento_fim:"Enlonado",concluido:"Concluído"};
const sl=s=>SL[s]||s||"—";
function pill(s){
  if(!s||s==="posto1")return`<span class="pi pb">🔵 Entrada</span>`;
  if(s.startsWith("triagem"))return`<span class="pi py">🟡 ${SL[s]||s}</span>`;
  if(s.startsWith("carregamento"))return`<span class="pi pr">🔴 ${SL[s]||s}</span>`;
  if(s.startsWith("enlonamento"))return`<span class="pi pp">🟣 ${SL[s]||s}</span>`;
  if(s==="concluido")return`<span class="pi pg">🟢 Concluído</span>`;
  return`<span class="pi pb">${s}</span>`;
}
async function up(k,pl){
  if(!F[k])return null;
  try{const r=ref(st,`f/${pl}/${k}_${Date.now()}.jpg`);await uploadString(r,F[k].b64,"data_url");return await getDownloadURL(r);}
  catch(e){return F[k].b64;}
}
function showMsg(t,txt){
  const el=document.getElementById("mg");if(!el)return;
  el.innerHTML=`<div class="al ${t==="ok"?"a-ok":"a-er"} on">${txt}</div>`;
  if(t==="ok")setTimeout(()=>el.innerHTML="",6000);
}
function rPA(k){
  const pa=document.getElementById("pa-"+k);if(!pa)return;
  pa.classList.remove("ok");
  const img=document.getElementById("pv-"+k);if(img)img.src="";
  const ts=document.getElementById("pts-"+k);if(ts)ts.textContent="";
}
window.capF=(k,e)=>{
  const f=e.target.files[0];if(!f)return;
  const ts=new Date();
  const rd=new FileReader();
  rd.onload=ev=>{
    F[k]={b64:ev.target.result,ts};
    const pa=document.getElementById("pa-"+k);
    if(pa){pa.classList.add("ok");const img=document.getElementById("pv-"+k);if(img)img.src=ev.target.result;}
    const te=document.getElementById("pts-"+k);if(te)te.textContent="📅 "+fmt(ts);
    onFoto(k);
  };
  rd.readAsDataURL(f);
};
const F={};let HD=[],DC=null;
onSnapshot(query(collection(db,"caminhoes_rastreio"),orderBy("criadoEm","desc")),snap=>{
  HD=snap.docs.map(d=>{return{id:d.id,...d.data()}}).filter(c=>c.data===hoje());
  renderLst();
  const p=document.getElementById("pl").value.toUpperCase().replace(/[^A-Z0-9]/g,"");
  if(p.length>=7)doSearch(p);
});
function renderLst(){
  const el=document.getElementById("lst");
  const it=HD.filter(c=>c["triagem"]);
  if(!it.length){el.innerHTML=`<div class="em">Nenhum registro hoje.</div>`;return;}
  el.innerHTML=`<div class="rl">`+it.map(c=>{
    const ini=c["triagem"]?.inicio?.toDate?c["triagem"].inicio.toDate():null;
    const fim=c["triagem"]?.fim?.toDate?c["triagem"].fim.toDate():null;
    const d=ini&&fim?` · ${dur(fim-ini)}`:"";
    return`<div class="ri"><div><div class="rip">${c.placa}</div><div class="rii">AC: ${c.ac}<br>▶ ${fmt(ini)}<br>⏹ ${fim?fmt(fim):"aguardando"}${d}</div></div>${pill(c.setorAtual)}</div>`;
  }).join("")+`</div>`;
}
window.bsc=()=>{
  const p=document.getElementById("pl").value.toUpperCase().replace(/[^A-Z0-9]/g,"");
  if(p.length>=7)doSearch(p);else clr();
};
function doSearch(p){
  DC=HD.find(c=>c.placa===p&&c.setorAtual!=="concluido")||null;
  if(!DC){clr();return;}
  document.getElementById("ip").textContent=DC.placa;
  document.getElementById("ia").textContent="AC: "+DC.ac;
  document.getElementById("is").textContent="Setor: "+sl(DC.setorAtual);
  document.getElementById("ifo").style.display="block";
  chkBtns();
}
function clr(){DC=null;document.getElementById("ifo").style.display="none";document.getElementById("bn-i").disabled=true;document.getElementById("bn-f").disabled=true;}
function chkBtns(){
  if(!DC)return;
  const hi=!!(DC["triagem"]?.inicio),hf=!!(DC["triagem"]?.fim);
  document.getElementById("bn-i").disabled=hi||!F["tri-i"];
  document.getElementById("bn-f").disabled=!hi||hf||!F["tri-f"];
}
window.onFoto=k=>chkBtns();
window.doS=async(t)=>{
  if(!DC){showMsg("er","Busque uma placa primeiro.");return;}
  const fk="tri-"+t;
  if(!F[fk]){showMsg("er","Tire a foto primeiro.");return;}
  document.getElementById("bn-"+t).disabled=true;
  try{
    const ts=F[fk].ts,url=await up(fk,DC.placa);
    const u={};
    u["triagem."+(t==="i"?"inicio":"fim")]=Timestamp.fromDate(ts);
    u["triagem.foto"+(t==="i"?"Ini":"Fim")]=url;
    u.ac=DC.ac;
    u.setorAtual=t==="i"?"triagem_inicio":"triagem_fim";
    await updateDoc(doc(db,"caminhoes_rastreio",DC.id),u);
    showMsg("ok",`✅ ${DC.placa} · AC: ${DC.ac} · ${t==="i"?"Início":"Fim"}: ${fmtT(ts)}`);
    rPA(fk);delete F[fk];
  }catch(e){showMsg("er","Erro: "+e.message);document.getElementById("bn-"+t).disabled=false;}
};
</script></body></html>
