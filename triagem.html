<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Triagem de Palete</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0f1e;--c1:#0f1a2e;--c2:#162444;--bd:#1e3558;--b2:#2a4870;--tx:#dff0ff;--t2:#7aafcc;--t3:#3a6880;--r:14px;--rs:10px}
body{background:var(--bg);color:var(--tx);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.box{width:100%;max-width:440px}
.hdr{text-align:center;margin-bottom:24px}
.hdr .ic{font-size:52px;display:block;margin-bottom:8px}
.hdr h1{font-size:20px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.hdr p{font-size:12px;color:var(--t2);margin-top:5px}
.cam{width:100%;background:var(--c1);border:2px dashed var(--bd);border-radius:var(--r);min-height:190px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;margin-bottom:12px}
.cam:active{transform:scale(.98)}
.cam.done{border-color:var(--ac);border-style:solid}
.cam.spin{border-color:#ffd000;border-style:solid;animation:blink .8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}
.cam input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.cam .ci{font-size:48px;pointer-events:none}
.cam .cl{font-size:13px;color:var(--t2);pointer-events:none;font-weight:600;text-align:center;padding:0 8px}
.cam .cs{font-size:10px;color:var(--t3);pointer-events:none}
.prev{width:100%;max-height:220px;object-fit:cover;display:none}
.cam.done .ci,.cam.done .cl,.cam.done .cs{display:none}
.cam.done .prev{display:block}
.cam.spin .ci,.cam.spin .cl,.cam.spin .cs{display:none}
.tsbar{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.88);padding:7px 11px;font-size:11px;font-weight:700;color:#00e896;display:none;line-height:1.6}
.cam.done .tsbar,.cam.spin .tsbar{display:block}
.ov{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:rgba(0,0,0,.6)}
.cam.spin .ov{display:flex}
.sp{width:34px;height:34px;border:4px solid rgba(255,208,0,.2);border-top-color:#ffd000;border-radius:50%;animation:ro .7s linear infinite}
@keyframes ro{to{transform:rotate(360deg)}}
.sptxt{font-size:13px;color:#ffd000;font-weight:700}
.res{background:var(--c1);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:12px;display:none;text-align:center}
.res .placa{font-size:34px;font-weight:900;letter-spacing:3px;font-family:monospace}
.res .inf{font-size:12px;color:var(--t2);margin-top:6px;line-height:1.8}
.go{width:100%;padding:16px;border:none;border-radius:var(--rs);font-size:16px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all .2s;display:none}
.go:active{transform:scale(.97)}
.go:disabled{opacity:.3;cursor:not-allowed}
.msg{padding:12px 16px;border-radius:var(--rs);font-size:13px;margin-bottom:12px;display:none;text-align:center;font-weight:600}
.msg.on{display:block}
.ok{background:rgba(0,232,150,.1);border:1px solid rgba(0,232,150,.3);color:#00e896}
.er{background:rgba(255,68,102,.1);border:1px solid rgba(255,68,102,.3);color:#ff4466}
.wn{background:rgba(255,208,0,.1);border:1px solid rgba(255,208,0,.3);color:#ffd000}
.retry-btn{background:transparent;border:1px solid var(--bd);border-radius:var(--rs);color:var(--t2);padding:10px;width:100%;font-size:13px;cursor:pointer;margin-top:6px;display:none;text-align:center}
:root{--ac:#ffd000}
.hdr h1{color:#ffd000}
.res .placa{color:#ffd000}
</style>
</head>
<body>
<div class="box">
  <div class="hdr">
    <span class="ic">📦</span>
    <h1>Triagem de Palete</h1>
  </div>
  <div id="msg" class="msg"></div>
  
  <p style="font-size:12px;color:var(--t2);text-align:center;margin-bottom:14px">Tire a foto da placa para registrar início ou fim</p>

  <div style="background:var(--c1);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:12px">
    <p style="font-size:11px;color:var(--t2);margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">▶ Início</p>
    <div class="cam" id="cam-i" onclick="document.getElementById('fi-i').click()">
      <input type="file" id="fi-i" accept="image/*" capture="environment"/>
      <div class="ci">📷</div>
      <div class="cl">Fotografar placa</div>
      <div class="cs">Timestamp automático</div>
      <img class="prev" id="pv-i"/>
      <div class="tsbar" id="cam-i-ts"></div>
      <div class="ov"><div class="sp"></div><div class="sptxt">🤖 Lendo placa...</div></div>
    </div>
    <div class="res" id="res-i"><div class="placa" id="rpl-i"></div><div class="inf" id="rinf-i"></div></div>
    <button class="go" id="go-i" onclick="doS('i')" style="background:linear-gradient(135deg,#ffd000,#cc6600);color:#000">▶ Registrar Início</button>
  </div>

  <div style="background:var(--c1);border:1px solid var(--bd);border-radius:var(--r);padding:14px">
    <p style="font-size:11px;color:var(--t2);margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">⏹ Fim</p>
    <div class="cam" id="cam-f" onclick="document.getElementById('fi-f').click()">
      <input type="file" id="fi-f" accept="image/*" capture="environment"/>
      <div class="ci">📷</div>
      <div class="cl">Fotografar placa</div>
      <div class="cs">Timestamp automático</div>
      <img class="prev" id="pv-f"/>
      <div class="tsbar" id="cam-f-ts"></div>
      <div class="ov"><div class="sp"></div><div class="sptxt">🤖 Lendo placa...</div></div>
    </div>
    <div class="res" id="res-f"><div class="placa" id="rpl-f"></div><div class="inf" id="rinf-f"></div></div>
    <button class="go" id="go-f" onclick="doS('f')" style="background:linear-gradient(135deg,#00e896,#009960);color:#000">⏹ Registrar Fim</button>
  </div>
  <button class="retry-btn" id="retry" onclick="resetar()">↩ Nova foto</button>
</div>
<script type="module">

import{initializeApp}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";import{getFirestore,collection,onSnapshot,query,orderBy,updateDoc,doc,Timestamp}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";import{getStorage,ref,uploadString,getDownloadURL}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-storage.js";
const app=initializeApp({apiKey:"AIzaSyCzd3mlF0qlPvw1AwVv3PAt9RXnZQ06sdY",authDomain:"cimento-d887e.firebaseapp.com",projectId:"cimento-d887e",storageBucket:"cimento-d887e.firebasestorage.app",messagingSenderId:"1098178518193",appId:"1:1098178518193:web:8712992a0eda7730ce9690"});
const db=getFirestore(app),storage=getStorage(app);

const KEY="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";
const hoje=()=>new Date().toISOString().split("T")[0];
const fmt=d=>d?d.toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"}):"—";
const fmtT=d=>d?d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"}):"—";
function dur(ms){if(!ms||ms<0)return"";const m=Math.round(ms/60000);return m<60?m+"min":Math.floor(m/60)+"h"+m%60+"m";}
async function callAI(b64,prompt){
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:80,messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64.split(",")[1]}},
        {type:"text",text:prompt}
      ]}]})
    });
    const d=await r.json();return(d.content?.[0]?.text||"").trim();
  }catch(e){return "";}
}
async function lerPlaca(b64){
  const r=await callAI(b64,"Leia a placa do veículo brasileiro nesta foto. Responda APENAS com a placa sem espaços (ex: ABC1234). Se não encontrar: NAO");
  const t=r.toUpperCase().replace(/[^A-Z0-9]/g,"");
  return(t.length>=7&&!t.startsWith("NAO"))?t.slice(0,8):null;
}
async function upFoto(b64,path){
  try{
    const r2=ref(storage,"fotos/"+path+"_"+Date.now()+".jpg");
    await uploadString(r2,b64,"data_url");return await getDownloadURL(r2);
  }catch(e){return b64;}
}
function initCam(camId,tsId,onReady){
  const area=document.getElementById(camId);
  const inp=area.querySelector("input[type=file]");
  inp.addEventListener("change",async e=>{
    const f=e.target.files[0];if(!f)return;
    const ts=new Date();
    const rd=new FileReader();
    rd.onload=ev=>onReady(ev.target.result,ts);
    rd.readAsDataURL(f);
    inp.value="";
  });
}
function setArea(id,state,b64,tsText){
  const area=document.getElementById(id);
  area.classList.remove("done","spin");
  if(state)area.classList.add(state);
  if(b64){const p=area.querySelector(".prev");if(p)p.src=b64;}
  const te=document.getElementById(id+"-ts");if(te&&tsText)te.textContent=tsText;
}
function showMsg(type,txt,auto=true){
  const el=document.getElementById("msg");
  el.className="msg on "+type;el.textContent=txt;
  if(type==="ok"&&auto)setTimeout(()=>{el.className="msg";el.textContent="";},6000);
}
const DC={},B64={},TS={};
let HD=[];
onSnapshot(query(collection(db,"caminhoes_rastreio"),orderBy("criadoEm","desc")),snap=>{
  HD=snap.docs.map(d=>{return{id:d.id,...d.data()}}).filter(c=>c.data===hoje());
});
["i","f"].forEach(t=>{
  initCam("cam-"+t,"cam-"+t+"-ts",async(img,ts)=>{
    B64[t]=img;TS[t]=ts;
    setArea("cam-"+t,"spin",img,"🤖 Lendo placa...");
    const pl=await lerPlaca(img);
    if(!pl){setArea("cam-"+t,null,null,"⚠️ Não lida");showMsg("wn","Placa não identificada.");document.getElementById("retry").style.display="block";return;}
    const c=HD.find(d=>d.placa===pl&&d.setorAtual!=="concluido");
    if(!c){setArea("cam-"+t,"done",img,"⚠️ "+pl+" não encontrado");showMsg("er","Caminhão "+pl+" não encontrado hoje.");return;}
    DC[t]=c;
    setArea("cam-"+t,"done",img,"🚛 "+pl+" · AC: "+c.ac+" · "+fmtT(ts));
    document.getElementById("rpl-"+t).textContent=pl;
    document.getElementById("rinf-"+t).innerHTML="AC: "+c.ac+"<br>Setor: "+c.setorAtual.replace(/_/g," ");
    document.getElementById("res-"+t).style.display="block";
    document.getElementById("go-"+t).style.display="block";
  });
});
window.doS=async(t)=>{
  const c=DC[t];if(!c||!B64[t]){showMsg("er","Tire a foto primeiro.");return;}
  document.getElementById("go-"+t).disabled=true;
  try{
    const ts=TS[t],url=await upFoto(B64[t],"triagem_"+t+"_"+c.placa);
    const u={};
    u["triagem."+(t==="i"?"inicio":"fim")]=Timestamp.fromDate(ts);
    u["triagem.foto"+(t==="i"?"Ini":"Fim")]=url;
    u.ac=c.ac;
    u.setorAtual=t==="i"?"triagem_inicio":"triagem_fim";
    await updateDoc(doc(db,"caminhoes_rastreio",c.id),u);
    showMsg("ok","✅ "+c.placa+" · AC: "+c.ac+" · "+(t==="i"?"Início":"Fim")+": "+fmtT(ts));
    setArea("cam-"+t,null,null,"");
    document.getElementById("cam-"+t).querySelector(".prev").src="";
    document.getElementById("res-"+t).style.display="none";
    document.getElementById("go-"+t).style.display="none";
    document.getElementById("go-"+t).disabled=false;
    delete DC[t];delete B64[t];delete TS[t];
  }catch(e){showMsg("er","Erro: "+e.message);document.getElementById("go-"+t).disabled=false;}
};
window.resetar=()=>{
  ["i","f"].forEach(t=>{
    setArea("cam-"+t,null,null,"");
    const p=document.getElementById("cam-"+t).querySelector(".prev");if(p)p.src="";
    document.getElementById("res-"+t).style.display="none";
    document.getElementById("go-"+t).style.display="none";
    document.getElementById("go-"+t).disabled=false;
    delete DC[t];delete B64[t];delete TS[t];
  });
  document.getElementById("retry").style.display="none";
};
</script>
</body></html>
